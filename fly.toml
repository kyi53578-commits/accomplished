[app]
name = "daily-tracker-kyi53578"
primary_region = "lax"

[build]

[env]
  PORT = "3000"

  [http_service]
    internal_port = 3000
      force_https = true
        auto_stop_machines = false
          auto_start_machines = true
            min_machines_running = 1

            [[vm]]
              memory = "256mb"
                cpu_kind = "shared"
                  cpus = 1
                  
